<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Invoice — Foreman</title>
<meta name="description" content="Your invoice.">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#fcfcfa" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#15171a" media="(prefers-color-scheme: dark)">
<link rel="stylesheet" href="/assets/foreman.css">
<script src="https://js.stripe.com/v3/"></script>
</head>
<body>

<div id="root" class="doc-wrap">
  <div id="loading" class="state-pad">
    <div class="spinner" aria-hidden="true"></div>
    <div class="state-body">Loading your invoice…</div>
  </div>
</div>

<script src="/assets/foreman.js"></script>
<script>
(function () {
  'use strict';
  var F = window.Foreman;
  var token = F.getToken();
  var root = document.getElementById('root');
  var CCY = 'USD';
  var confettiFired = false;   // guard: fire the paid-confetti burst only once

  function stateScreen(title, body, link) {
    root.innerHTML =
      '<div class="state-pad">' +
        '<div class="state-title">' + F.escapeHtml(title) + '</div>' +
        '<div class="state-body">' + F.escapeHtml(body) + '</div>' +
        (link ? '<a class="btn-quiet" style="margin-top:14px" href="' + link.href + '">' + F.escapeHtml(link.label) + '</a>' : '') +
      '</div>';
  }

  if (!token || token.length < 16) {
    stateScreen('Invoice link looks off',
      'This link is missing or incomplete. Please reopen the link from the message you were sent.',
      { href: 'https://' + location.host + '/', label: 'About Foreman' });
    return;
  }

  function logoBadge(biz) {
    if (biz.logo_url) {
      return '<div class="logo-badge"><img src="' + F.escapeHtml(biz.logo_url) +
        '" alt="" onerror="this.parentNode.textContent=\'' + F.escapeHtml(F.initials(biz.name)) + '\'"></div>';
    }
    return '<div class="logo-badge">' + F.escapeHtml(F.initials(biz.name)) + '</div>';
  }
  function bizMeta(biz) {
    var bits = [];
    if (biz.license_no) bits.push('Lic #' + F.escapeHtml(biz.license_no));
    if (biz.insurance_no) bits.push('Insured');
    if (biz.phone) bits.push(F.escapeHtml(biz.phone));
    return bits.join(' · ');
  }
  function linesHtml(lines) {
    if (!lines || !lines.length) return '';
    return lines.map(function (l, i) {
      var last = i === lines.length - 1;
      var qty = F.lineQty(l);
      return '<div class="line"' + (last ? ' style="border-bottom:0"' : '') + '>' +
        '<div style="min-width:0">' +
          '<div class="line-desc">' + F.escapeHtml(l.description || '') + '</div>' +
          (qty ? '<div class="line-qty">' + F.escapeHtml(qty) + '</div>' : '') +
        '</div>' +
        '<div class="line-amt money-m">' + F.money(l.total, CCY) + '</div>' +
      '</div>';
    }).join('');
  }

  // Derive status: explicit doc.status, else infer from amounts + due date.
  function deriveState(doc) {
    var total = Number(doc.total || 0);
    var paid = Number(doc.amount_paid || 0);
    var balance = Math.max(0, total - paid);
    var status = doc.status;
    var overdue = false;
    if (status !== 'paid' && balance > 0 && doc.due_date) {
      var due = new Date(doc.due_date);
      if (!isNaN(due.getTime()) && due.getTime() < Date.now()) overdue = true;
    }
    var kind;
    if (status === 'paid' || balance <= 0) kind = 'paid';
    else if (paid > 0) kind = 'partial';
    else if (overdue || status === 'overdue') kind = 'overdue';
    else kind = 'due';
    return { kind: kind, total: total, paid: paid, balance: balance };
  }

  function stampFor(kind) {
    var label = { paid: 'Paid', partial: 'Partial', overdue: 'Overdue', due: 'Due' }[kind];
    return '<span class="stamp stamp--' + kind + ' stamp--animate">' + label + '</span>';
  }

  function render(payload) {
    var doc = payload.document;
    var biz = payload.business || {};
    var lines = payload.lines || [];
    CCY = biz.currency || 'USD';
    var st = deriveState(doc);

    var billedTo = payload.client_first_name ? F.escapeHtml(payload.client_first_name) : 'You';

    // Big balance / paid block.
    var balanceBlock;
    if (st.kind === 'paid') {
      var paidWhen = doc.due_date ? '' : '';
      balanceBlock =
        '<div class="balance-block">' +
          '<div class="balance-label">Balance due</div>' +
          '<div class="money-xl" style="color:var(--cash)">' + F.money(0, CCY) + '</div>' +
          '<div class="balance-note" style="color:var(--cash)">Paid in full — thank you!</div>' +
        '</div>';
    } else {
      var paidNote = st.paid > 0
        ? '<div class="balance-note" style="color:var(--cash)">' + F.money(st.paid, CCY) + ' paid — thanks</div>'
        : '';
      var dueNote = '';
      if (st.kind === 'overdue' && doc.due_date) {
        dueNote = '<div class="balance-note" style="color:var(--alarm)">Was due ' + F.escapeHtml(F.formatDate(doc.due_date)) + '</div>';
      } else if (doc.due_date) {
        dueNote = '<div class="balance-note">Due ' + F.escapeHtml(F.formatDate(doc.due_date)) + '</div>';
      }
      balanceBlock =
        '<div class="balance-block">' +
          '<div class="balance-label">Balance due</div>' +
          '<div class="money-xl">' + F.money(st.balance, CCY) + '</div>' +
          paidNote + dueNote +
        '</div>';
    }

    // Totals: total, payments applied, bottom line.
    var paymentRow = st.paid > 0
      ? '<div class="total-row" style="margin-top:8px"><div class="total-label">Paid to date</div>' +
        '<div class="money-s" style="color:var(--cash)">−' + F.money(st.paid, CCY) + '</div></div>'
      : '';
    var bottomLabel = st.kind === 'paid' ? 'Paid in full' : 'Balance due';
    var bottomColor = st.kind === 'paid' ? 'var(--cash)' : (st.kind === 'overdue' ? 'var(--alarm)' : 'var(--ink)');
    var bottomAmt = st.kind === 'paid' ? F.money(st.total, CCY) : F.money(st.balance, CCY);

    var taxRow = (Number(doc.tax_amount) > 0 || Number(doc.tax_rate) > 0)
      ? '<div class="total-row"><div class="total-label">Tax' +
          (doc.tax_rate ? ' (' + doc.tax_rate + '%)' : '') + '</div>' +
          '<div class="money-s">' + F.money(doc.tax_amount, CCY) + '</div></div>'
      : '';

    var issued = doc.due_date ? '' : '';
    var dueLine = doc.due_date
      ? '<div class="meta-sub">Due ' + F.escapeHtml(F.formatDate(doc.due_date)) + '</div>'
      : '';

    // Payment instructions. If the business has online payments on, the dock shows
    // a real Pay button (card / Apple Pay via Stripe); otherwise fall back to contact.
    var canPayOnline = !!biz.stripe_enabled && st.kind !== 'paid' && st.balance > 0;
    var payHint;
    if (st.kind === 'paid') {
      payHint = 'This page is your receipt. Thank you for your business.';
    } else if (canPayOnline) {
      payHint = 'Pay securely below by card or Apple Pay. Powered by Stripe — ' +
        F.escapeHtml(biz.name || 'the business') + ' receives the payment directly.';
    } else {
      var contact = biz.email ? biz.email : (biz.phone ? biz.phone : 'the business');
      payHint = 'To pay ' + F.money(st.balance, CCY) + ', contact ' +
        F.escapeHtml(biz.name || 'the business') +
        (biz.email || biz.phone ? ' at ' + F.escapeHtml(contact) : '') +
        ' to arrange payment. Or reply to the message this invoice came from.';
    }
    var terms = biz.terms ? ' ' + F.escapeHtml(biz.terms) : '';

    var contactBtn = '';
    if (canPayOnline) {
      contactBtn = '<div class="dock"><div class="dock-inner">' +
        '<button id="pay-btn" type="button" class="btn-primary" style="width:100%;border:0;cursor:pointer">Pay ' + F.money(st.balance, CCY) + '</button>' +
        '</div></div>';
    } else if (st.kind !== 'paid' && (biz.email || biz.phone)) {
      var href = biz.email
        ? 'mailto:' + biz.email + '?subject=' + encodeURIComponent('Payment for invoice' + (doc.number != null ? ' #' + doc.number : ''))
        : 'sms:' + String(biz.phone).replace(/[^\d+]/g, '');
      contactBtn = '<div class="dock"><div class="dock-inner">' +
        '<a class="btn-primary" style="display:flex;align-items:center;justify-content:center;text-decoration:none" href="' + href + '">Contact about payment</a>' +
        '</div></div>';
    }

    // Tier-gated footer: only FREE-tier pros (biz.watermark) carry the quiet
    // "Sent with Foreman" line. Paid Pros get no Foreman footer at all.
    var sentWith = biz.watermark
      ? '<div class="sent-with"><a href="https://' + location.host + '/">Sent with Foreman</a></div>'
      : '';

    root.innerHTML =
      '<div class="doc-col">' +
        '<div class="doc-card">' +
          '<div class="letterhead">' +
            '<div class="letterhead-row">' +
              logoBadge(biz) +
              '<div style="min-width:0">' +
                '<div class="biz-name">' + F.escapeHtml(biz.name || 'Your tradesperson') + '</div>' +
                (bizMeta(biz) ? '<div class="biz-meta">' + bizMeta(biz) + '</div>' : '') +
              '</div>' +
            '</div>' +
            '<div class="letterhead-stamp">' + stampFor(st.kind) + '</div>' +
          '</div>' +
          '<div class="doc-hr doc-hr--inset"></div>' +
          '<div class="meta-row">' +
            '<div>' +
              '<div class="meta-label">Billed to</div>' +
              '<div class="meta-strong">' + billedTo + '</div>' +
            '</div>' +
            '<div class="meta-right">' +
              '<div class="meta-label">Invoice' + (doc.number != null ? ' #' + F.escapeHtml(String(doc.number)) : '') + '</div>' +
              dueLine +
            '</div>' +
          '</div>' +
          '<div class="doc-hr"></div>' +
          balanceBlock +
          '<div class="doc-hr"></div>' +
          linesHtml(lines) +
          '<div class="totals">' +
            '<div class="total-row"><div class="total-label">Subtotal</div>' +
              '<div class="money-s">' + F.money(doc.subtotal, CCY) + '</div></div>' +
            taxRow +
            '<div class="total-row" style="margin-top:8px"><div class="total-label">Total</div>' +
              '<div class="money-s">' + F.money(st.total, CCY) + '</div></div>' +
            paymentRow +
            '<div class="totals-rule"></div>' +
            '<div class="total-row"><div class="grand-label">' + bottomLabel + '</div>' +
              '<div class="money-m" style="color:' + bottomColor + '">' + bottomAmt + '</div></div>' +
          '</div>' +
          '<div class="doc-hr doc-hr--inset"></div>' +
          '<div class="footnote">' + payHint + terms + '</div>' +
        '</div>' +
        sentWith +
      '</div>' +
      contactBtn;

    var payBtn = document.getElementById('pay-btn');
    if (payBtn) {
      payBtn.addEventListener('click', function () { startPayment(st.balance); });
    }

    // Cash-green confetti once when a paid invoice first renders.
    if (st.kind === 'paid' && !confettiFired) {
      confettiFired = true;
      F.fireConfetti();
    }
  }

  // ── Online payment (Stripe Payment Element) ──────────────────────────────
  // Opens a bottom sheet, creates a PaymentIntent on the pro's connected
  // account, mounts Stripe's Payment Element (card + Apple/Google Pay), and
  // confirms. The stripe-webhook marks the invoice paid server-side; we reload
  // so the page re-fetches and shows the Paid receipt.
  function startPayment(balance) {
    var pk = F.STRIPE_PK || '';
    if (!window.Stripe || pk.indexOf('pk_') !== 0 || pk.indexOf('REPLACE') !== -1) {
      alert('Online payment isn’t available yet. Please contact the business to arrange payment.');
      return;
    }

    var ov = document.createElement('div');
    ov.id = 'pay-overlay';
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;' +
      'align-items:flex-end;justify-content:center;z-index:9999;animation:payfade .2s ease';
    var amt = F.money(balance, CCY);
    ov.innerHTML =
      '<div style="background:var(--paper,#fff);width:100%;max-width:480px;' +
        'border-radius:18px 18px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));' +
        'box-shadow:0 -8px 40px rgba(0,0,0,.22)">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">' +
          '<div style="font-weight:800;font-size:18px;color:var(--ink,#15171a)">Pay ' + amt + '</div>' +
          '<button id="pay-close" type="button" aria-label="Close" style="border:0;background:transparent;' +
            'font-size:24px;line-height:1;color:var(--steel,#888);cursor:pointer;padding:0 4px">×</button>' +
        '</div>' +
        '<div id="payment-element" style="min-height:48px"></div>' +
        '<div id="pay-error" role="alert" style="color:var(--alarm,#c0392b);font-size:14px;margin-top:10px"></div>' +
        '<button id="pay-submit" type="button" class="btn-primary" disabled ' +
          'style="width:100%;border:0;cursor:pointer;margin-top:16px;opacity:.6">Pay ' + amt + '</button>' +
        '<div style="text-align:center;font-size:12px;color:var(--steel,#999);margin-top:12px">🔒 Secured by Stripe</div>' +
      '</div>';
    document.body.appendChild(ov);

    var card = ov.firstChild;
    var errEl = document.getElementById('pay-error');
    var submitBtn = document.getElementById('pay-submit');
    document.getElementById('pay-close').addEventListener('click', function () { ov.remove(); });
    ov.addEventListener('click', function (e) { if (e.target === ov) ov.remove(); });

    F.createPaymentIntent('invoice', token, Math.round(balance * 100)).then(function (res) {
      if (!res.ok || !res.data || !res.data.client_secret) {
        errEl.textContent = (res.data && res.data.error) ? res.data.error
          : 'Couldn’t start the payment. Please try again or contact the business.';
        return;
      }
      var stripe = Stripe(pk);
      var elements = stripe.elements({ clientSecret: res.data.client_secret, appearance: { theme: 'stripe' } });
      elements.create('payment').mount('#payment-element');
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';

      submitBtn.addEventListener('click', function () {
        submitBtn.disabled = true; submitBtn.style.opacity = '.6';
        submitBtn.textContent = 'Processing…'; errEl.textContent = '';
        stripe.confirmPayment({ elements: elements, redirect: 'if_required' }).then(function (result) {
          if (result.error) {
            errEl.textContent = result.error.message || 'Payment failed. Please try again.';
            submitBtn.disabled = false; submitBtn.style.opacity = '1';
            submitBtn.textContent = 'Pay ' + amt;
          } else if (result.paymentIntent && result.paymentIntent.status === 'succeeded') {
            card.innerHTML =
              '<div style="text-align:center;padding:24px 0 8px">' +
                '<div style="font-size:44px">✅</div>' +
                '<div style="font-weight:800;font-size:20px;color:var(--cash,#1a7f4b);margin-top:10px">Paid ' + amt + '</div>' +
                '<div style="color:var(--steel,#888);margin-top:6px">Thank you! Updating your receipt…</div>' +
              '</div>';
            setTimeout(function () { location.reload(); }, 2200);
          } else {
            errEl.textContent = 'Payment is processing — you can safely close this page.';
            submitBtn.textContent = 'Pay ' + amt;
          }
        });
      });
    }).catch(function () {
      errEl.textContent = 'Network error. Please check your connection and try again.';
    });
  }

  F.fetchDocument('invoice', token).then(function (res) {
    if (res.status === 404) {
      stateScreen('Invoice not found',
        'This invoice link is invalid or has been removed. Double-check the link, or reach out to the business that sent it.',
        { href: 'https://' + location.host + '/', label: 'About Foreman' });
      return;
    }
    if (!res.ok || !res.data || !res.data.document) {
      stateScreen('Couldn’t load this invoice',
        'Something went wrong on our end. Please try again in a moment.', null);
      return;
    }
    render(res.data);
  }).catch(function () {
    stateScreen('Couldn’t load this invoice',
      'Check your internet connection and try again.', null);
  });
})();
</script>
</body>
</html>
